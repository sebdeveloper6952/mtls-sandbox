services:
  mtls-sandbox:
    build: .
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./certs:/certs
    environment:
      - MTLS_HOSTNAMES=localhost,127.0.0.1,mtls.apps.sebdev.io
      - MTLS_TLS_PERSIST_PATH=/certs

